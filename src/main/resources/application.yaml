spring:
  application:
    name: ${spring.application.name:knowledge}
  servlet:
    multipart:
      max-file-size: ${spring.servlet.multipart.max-file-size:50MB}
      max-request-size: ${spring.servlet.multipart.max-request-size:50MB}

ollama:
  base-url: ${ollama.base-url:http://localhost:11434}
  chat-model: ${ollama.chat-model:qwen2.5:7b}
  embedding-model: ${ollama.embedding-model:qwen3-embedding:0.6b}
  timeout: ${ollama.timeout:120s}

qdrant:
  host: ${qdrant.host:localhost}
  port: ${qdrant.port:6334}
  http-port: ${qdrant.http-port:6333}
  collection-name: ${qdrant.collection-name:knowledge-base}
  vector-size: ${qdrant.vector-size:1024}
  create-collection-if-not-exists: ${qdrant.create-collection-if-not-exists:true}

rag:
  chunk-size: ${rag.chunk-size:500}
  chunk-overlap: ${rag.chunk-overlap:50}
  max-results: ${rag.max-results:5}
  min-score: ${rag.min-score:0.5}
  memory-window: ${rag.memory-window:6}
  session-ttl-seconds: ${rag.session-ttl-seconds:1800}
  memory-cleanup-interval-ms: ${rag.memory-cleanup-interval-ms:300000}

logging:
  level:
    root: ${logging.level.root:INFO}
    com.mark.knowledge: ${logging.level.com.mark.knowledge:DEBUG}
    dev.langchain4j: ${logging.level.dev.langchain4j:DEBUG}
