spring:
  application:
    name: knowledge
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

ollama:
  base-url: http://localhost:11434
  chat-model: qwen2.5:7b
  embedding-model: qwen3-embedding:0.6b
  timeout: 120s

qdrant:
  host: localhost
  port: 6334
  http-port: 6333
  collection-name: knowledge-base
  vector-size: 1024
  create-collection-if-not-exists: true

rag:
  chunk-size: 500
  chunk-overlap: 50
  max-results: 5
  min-score: 0.5
  memory-window: 6
  session-ttl-seconds: 1800
  memory-cleanup-interval-ms: 300000

logging:
  level:
    root: INFO
    com.mark.knowledge: DEBUG
    dev.langchain4j: DEBUG
